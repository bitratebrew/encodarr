<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encodarr — Login</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='1' y='1' width='30' height='30' rx='6' fill='%231a1a24' stroke='%231a1a24' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='8.8' fill='%23e63946'/%3E%3Ccircle cx='16' cy='16' r='5.6' fill='%23ff6b6b'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #1a1a24;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .login-logo-text {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .login-title {
      font-size: 15px;
      color: #8888aa;
      margin-bottom: 24px;
    }
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #8888aa;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      background: #0f0f13;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 10px 14px;
      color: #e8e8f0;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 200ms ease;
    }
    .form-input:focus { border-color: #6c63ff; }
    .btn-primary {
      width: 100%;
      margin-top: 24px;
      padding: 11px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 200ms ease;
    }
    .btn-primary:hover { opacity: 0.88; }
    .error-msg {
      margin-top: 16px;
      padding: 10px 14px;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      color: #f87171;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <svg width="32" height="32" viewBox="0 0 32 32">
        <rect x="1" y="1" width="30" height="30" rx="6" fill="#1a1a24" stroke="#1a1a24" stroke-width="2"/>
        <circle cx="16" cy="16" r="8.8" fill="#e63946"/>
        <circle cx="16" cy="16" r="5.6" fill="#ff6b6b"/>
      </svg>
      <span class="login-logo-text">Encodarr</span>
    </div>
    <p class="login-title">Enter your password to continue.</p>
    <form method="POST" action="/api/auth/login">
      <label class="form-label" for="username">Username</label>
      <input class="form-input" type="text" id="username" name="username" autofocus autocomplete="username" style="margin-bottom:12px">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" name="password" autocomplete="current-password">
      <button class="btn-primary" type="submit">Sign In</button>
    </form>
    {% if error %}
    <div class="error-msg">Incorrect password. Please try again.</div>
    {% endif %}
  </div>
</body>
</html>
