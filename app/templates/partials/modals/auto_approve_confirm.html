<!-- ── Reset Confirmation Modal ─────────────────────────────────────────── -->
<div class="modal-overlay" id="auto-approve-confirm-modal">
  <div class="modal">
    <div class="modal-title" style="color:#e63946">⚠ Save Auto-Approve Rule?</div>
    <div class="modal-subtitle" style="text-align:left;line-height:1.6">
      This rule will automatically approve and queue matching files for encoding without any manual review.<br><br>
      In <strong>Replace</strong> mode your original files will be <strong>permanently overwritten</strong>. There is no undo.<br><br>
      Ensure your conditions are correctly configured before saving.
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="auto-approve-confirm-cancel">Cancel</button>
      <button class="btn btn-danger-ghost" id="auto-approve-confirm-ok">I Understand</button>
    </div>
  </div>
</div>
