<div class="modal-overlay" id="stop-all-confirm-modal">
  <div class="modal">
    <div class="modal-title">Stop All Encoding?</div>
    <div class="modal-subtitle">
      This will immediately stop all currently encoding files, cancel all paused jobs, and remove all queued items — returning everything to the Candidates tab. Encoding progress will be lost.
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="stop-all-cancel-btn">Cancel</button>
      <button class="btn btn-danger-ghost" id="stop-all-ok-btn">Stop All</button>
    </div>
  </div>
</div>
