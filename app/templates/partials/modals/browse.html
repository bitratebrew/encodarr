<!-- ── Browse Modal ──────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="browse-modal">
  <div class="modal" style="max-width:480px">
    <div class="modal-title">Select Folder</div>
    <div class="browse-breadcrumb" id="browse-breadcrumb">/media</div>
    <div class="browse-dir-list" id="browse-dir-list"></div>
    <div class="modal-actions" style="margin-top:16px">
      <button class="btn-outline" id="browse-up-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="18 15 12 9 6 15"/>
        </svg>
        Up
      </button>
      <button class="btn-outline" id="browse-cancel">Cancel</button>
      <button class="btn btn-primary" id="browse-select">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Select this folder
      </button>
    </div>
  </div>
</div>
